version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: learnitali_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: learnitali
      POSTGRES_PASSWORD: learnitali_secret
      POSTGRES_DB: learnitali_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U learnitali -d learnitali_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnitali_net

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: learnitali_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnitali_net

  # ─── MinIO (S3-compatible local storage) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: learnitali_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console UI
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - learnitali_net

  # ─── NestJS Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: learnitali_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://learnitali:learnitali_secret@postgres:5432/learnitali_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_secret
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_BUCKET: learnitali-media
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_secret
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learnitali_net
    volumes:
      - ./backend/prisma:/app/prisma:ro

  # ─── Next.js Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnitali_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api/v1
      NEXTAUTH_URL: http://localhost:3001
    ports:
      - '3001:3001'
    depends_on:
      - backend
    networks:
      - learnitali_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  learnitali_net:
    driver: bridge
